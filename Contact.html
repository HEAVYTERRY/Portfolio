<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Portfolio - Contact</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">

<style>

* {
    box-sizing: border-box;
}

body {
    margin: 0;
    font-family: "Lato", sans-serif;
    background: white;
}

/* ---------------- Sidebar ---------------- */

.sidenav {
    height: 100%;
    width: 200px;
    position: fixed;
    top: 0;
    left: 0;
    background: white;
    overflow-x: hidden;
    padding-top: 20px;
}

.sidenav a {
    display: block;
    padding: 6px 32px;
    text-decoration: none;
    font-size: 25px;
    color: black;
}

.sidenav a:hover {
    color: #F54927;
}

/* ---------------- Main ---------------- */

.main {
    margin-left: 200px;
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    padding: 40px;
}

/* ---------------- Contact Box ---------------- */

.container {
    width: 100%;
    max-width: 700px;
}

.container h2 {
    text-align: center;
    margin-bottom: 10px;
}

.container p {
    text-align: center;
    margin-bottom: 30px;
}

/* ---------------- Social ---------------- */

.social {
    text-align: center;
    margin-bottom: 35px;
}

.social .fa {
    font-size: 42px;
    color: black;
    text-decoration: none;
    transition: 0.3s;
}

.social .fa:hover {
    color: #F54927;
}

.email {
    margin-top: 15px;
}

.email a {
    text-decoration: none;
    color: black;
    font-size: 20px;
}

.email a:hover {
    color: #F54927;
}

/* ---------------- Form ---------------- */

label {
    display: block;
    margin-bottom: 6px;
    font-weight: bold;
}

input[type=text],
input[type=email],
textarea {
    width: 100%;
    padding: 12px;
    border: 1px solid #ccc;
    margin-bottom: 20px;
    resize: vertical;
    font-family: inherit;
    font-size: 16px;
}

textarea {
    height: 170px;
}

input[type=submit] {
    background: #F54927;
    color: white;
    border: none;
    padding: 14px 24px;
    cursor: pointer;
    font-size: 16px;
}

input[type=submit]:hover {
    background: #d63f20;
}

/* ---------------- Mobile ---------------- */

@media screen and (max-width:768px) {

    .sidenav {
        width: 100%;
        height: auto;
        position: relative;
        text-align: center;
        padding-top: 10px;
    }

    .sidenav a {
        padding: 12px;
        font-size: 20px;
    }

    .main {
        margin-left: 0;
        padding: 30px 20px;
        align-items: flex-start;
    }

    .email a {
        font-size: 18px;
    }

}

</style>

</head>

<body>

<div class="sidenav">
    <a style="color:#F54927;">Lachlan Biewer</a>
    <a href="2dGraphics.html">2D Graphics</a>
    <a href="index.html">About</a>
    <a href="Contact.html">Contact</a>
</div>

<div class="main">

<div class="container">

    <h2>Contact</h2>
    <p>Feel free to get in touch.</p>

    <div class="social">

        <a href="https://www.instagram.com/heavy__terry/" target="_blank" class="fa fa-instagram"></a>

    </div>

    <form action="https://api.web3forms.com/submit" method="POST">

        <input type="hidden" name="access_key" value="15cad7c5-295c-48a5-9c44-8aa553b5c058">

        <input type="hidden" name="subject" value="New Portfolio Contact">

        <input type="hidden" name="from_name" value="Heavy Vision Portfolio">

        <label>Name</label>
        <input type="text" name="name" placeholder="Your name..." required>

        <label>Email</label>
        <input type="email" name="email" placeholder="Your email..." required>

        <label>Message</label>
        <textarea name="message" placeholder="Write your message..." required></textarea>

        <input type="submit" value="Send Message">

    </form>

</div>

</div>

</body>
</html>
