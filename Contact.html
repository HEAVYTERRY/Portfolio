<html>
<head>
<title>Portfolio - Contact</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">

<style>

body {
    margin: 0;
    font-family: "Lato", sans-serif;
}

/* Sidebar */

.sidenav {
    height: 100%;
    width: 200px;
    position: fixed;
    left: 0;
    top: 0;
    background: white;
    padding-top: 20px;
}

.sidenav a {
    display: block;
    padding: 6px 32px;
    text-decoration: none;
    font-size: 25px;
    color: black;
}

.sidenav a:hover {
    color: #F54927;
}

/* Main content */

.main {
    margin-left: 200px;
    min-height: 100vh;

    display: flex;
    justify-content: center;
    align-items: center;
}

.contact {
    text-align: center;
}

.contact p {
    font-size: 24px;
    margin-top: 20px;
}

/* Instagram */

.fa {
    padding: 18px;
    font-size: 40px;
    width: 75px;
    text-align: center;
    text-decoration: none;
    border-radius: 50%;
    background: #E4405F;
    color: white;
    transition: 0.3s;
}

.fa:hover {
    opacity: 0.8;
}

/* Mobile */

@media screen and (max-width: 768px) {

    .sidenav {
        width: 100%;
        height: auto;
        position: relative;
        padding-top: 10px;
        text-align: center;
    }

    .sidenav a {
        padding: 12px;
        font-size: 20px;
    }

    .main {
        margin-left: 0;
        min-height: calc(100vh - 170px);
        padding: 30px;
    }

    .contact p {
        font-size: 20px;
    }

    .fa {
        font-size: 35px;
        width: 65px;
    }
}

</style>
</head>

<body>

<div class="sidenav">
    <a style="color:#F54927;">Lachlan Biewer</a>
    <a href="2dGraphics.html">2D Graphics</a>
    <a href="index.html">About</a>
    <a href="Contact.html">Contact</a>
</div>

<div class="main">

    <div class="contact">

        <a href="https://www.instagram.com/heavy__terry/"
           class="fa fa-instagram"
           target="_blank"></a>

        <p>
            <a href="mailto:lachlan@email.com">
                lachlan@email.com
            </a>
        </p>

    </div>

</div>

</body>
</html>
