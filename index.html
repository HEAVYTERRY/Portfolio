<style>

* {

body {

/* ---------------- Sidebar ---------------- */

.sidenav {

    max-width: 700px;
    text-align: center;

}

.intro a {
    color: #F54927;
    text-decoration: none;
}

.intro a:hover {
    text-decoration: underline;
}

/* ---------------- Mobile ---------------- */

    .sidenav {
        width: 100%;
        height: auto;
        position: relative;
        padding-top: 10px;
        text-align: center;
    }

    .sidenav a {
        padding: 12px;
        font-size: 20px;
    }

    .main {
        margin-left: 0;
        min-height: auto;
