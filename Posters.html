<!DOCTYPE html>
<html>
<head>
<title>Portfolio - Posters</title>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

* {
  box-sizing: border-box;
}

body {
  margin: 0;
  font-family: "Lato", sans-serif;
}

/* Sidebar */

.sidenav {
  height: 100%;
  width: 200px;
  position: fixed;
  top: 0;
  left: 0;
  background-color: transparent;
  overflow-x: hidden;
  padding-top: 20px;
}

.sidenav a {
  display: block;
  padding: 6px 6px 6px 32px;
  text-decoration: none;
  font-size: 25px;
  color: black;
}

.sidenav a:hover {
  color: #F54927;
}

/* Header */

.header {
  text-align: center;
  padding: 32px;
}

/* Poster Grid */

.row {
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
  gap: 20px;
  margin-left: 200px;
}

.column {
  width: 500px;
  padding: 10px;
}

.column img {
  width: 100%;
  display: block;
  margin-top: 12px;
}

.column p {
  text-align: center;
  color: Grey;
  font-family: "Lato", sans-serif;
  font-size: 15px;
  font-weight: bold;
  margin-top: 15px;
  line-height: 1.4;
}

/* Mobile */

@media screen and (max-width: 768px) {

  .sidenav {
    width: 100%;
    height: auto;
    position: relative;
    display: flex;
    justify-content: center;
    flex-wrap: wrap;
    padding-top: 10px;
  }

  .sidenav a {
    font-size: 18px;
    padding: 10px;
  }

  .row {
    flex-direction: column;
    align-items: center;
    margin-left: 0;
    gap: 20px;
  }

  .column {
    width: 90%;
    padding: 0;
  }

  .column img {
    width: 100%;
    height: auto;
  }

  .header {
    padding: 20px;
  }

}

</style>

</head>

<body>

</div>

</div>

</body>
</html>
