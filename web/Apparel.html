<style>

* {
    box-sizing: border-box;
}

body {
    margin: 0;

/* ---------------- Navigation ---------------- */

.sidenav {
    position: fixed;
    top: 0;
    left: 0;
    width: 200px;
    height: 100%;
    padding-top: 20px;
    overflow-x: hidden;
    background: transparent;
}

.sidenav a {
    display: block;

.header {
    text-align: center;
    padding: 40px 0 20px;
}

/* ---------------- Gallery ---------------- */

.row {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 35px;
    padding: 0 30px 40px;
}

.column {
    width: 460px;
}

.column img {
    width: 100%;
    display: block;
}

/* Optional captions */

.column p {
    margin-top: 12px;
    text-align: center;
    font-size: 15px;
    color: Grey;
    font-family: "Lato", sans-serif;
    font-weight: bold;
}

/* ---------------- Mobile ---------------- */

@media screen and (max-width:768px){

    .sidenav{
        position: relative;
        width:100%;
        height:auto;
        display:flex;
        justify-content:center;
        flex-wrap:wrap;
        padding-top:10px;
    }

    .sidenav a{
        font-size:18px;
        padding:10px;
    }

    .main{
        margin-left:0;
    }

    .header{
        padding:20px 0;
    }

    .row{
        flex-direction:column;
        align-items:center;
        gap:20px;
        padding:0 0 30px;
    }

    .column{
        width:90%;
    }

}

</style>
