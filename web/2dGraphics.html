<!DOCTYPE html>
<html>

<head>
<title>Portfolio - 2D Graphics</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body {
  font-family: "Lato", sans-serif;
  margin: 0;
}


/* Sidebar */
.sidenav {
  height: 100%;
  width: 200px;
  position: fixed;
  z-index: 1;
  top: 0;
  left: 0px;
  background-color: #FFFFFF;
  overflow-x: hidden;
  padding-top: 20px;
}

.sidenav a {
  padding: 6px 6px 6px 32px;
  text-decoration: none;
  font-size: 25px;
  color: #000000;
  display: block;
}

.sidenav a:hover {
  color: #F54927;
}


/* Main content */
.main {
  margin-left: 75px;
}


/* Menu */
.menu {
  display: flex;
  justify-content: center;
  align-items: center;
  gap: 50px;
  height: 100vh;
}


.menu a {
  text-decoration: none;
  color: #F54927;
  font-size: clamp(40px, 8vw, 100px);
  font-weight: bold;
}


.menu a:hover {
  color: black;
}



/* Phone layout */
@media screen and (max-width: 768px) {


  /* Sidebar becomes top navigation */
  .sidenav {
    width: 100%;
    height: auto;
    position: relative;
    padding-top: 10px;
    display: flex;
    justify-content: center;
    flex-wrap: wrap;
  }


  .sidenav a {
    font-size: 18px;
    padding: 10px;
  }


  /* Remove sidebar gap */
  .main {
    margin-left: 0;
  }


  /* Stack menu buttons */
  .menu {
    height: 70vh;
    flex-direction: column;
    gap: 30px;
  }


  .menu a {
    font-size: 50px;
  }

}

</style>

</head>


<body>


<div class="sidenav">
  <a style="color: #F54927;">Lachlan Biewer</a>
  <a href="2dGraphics.html">2D Graphics</a>
  <a href="About.html">About</a>
  <a href="Contact.html">Contact</a>
</div>


<div class="main">

<div class="menu">
    <a href="Apparel.html">Apparel</a>
    <a href="Posters.html">Posters</a>
</div>

</div>


</body>
</html>
